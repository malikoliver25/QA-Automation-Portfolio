name: Selenium Regression Suite

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  # Forces GitHub Actions to use Node 24 and clears the deprecation warning
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Run Selenium Tests
        working-directory: ./ui-automation-selenium
        # -Dheadless=true overrides the pom.xml default for the CI environment
        run: mvn clean test -Dheadless=true

      - name: Generate Allure Report
        if: always()
        working-directory: ./ui-automation-selenium
        run: mvn allure:report

      - name: Upload Allure Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results
          # Maven puts generated results inside the 'target' folder
          path: ui-automation-selenium/target/allure-results
          retention-days: 20